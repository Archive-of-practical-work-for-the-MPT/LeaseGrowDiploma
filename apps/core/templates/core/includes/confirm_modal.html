<div class="confirm-modal" id="leasingConfirmModal" hidden>
    <div class="confirm-modal-backdrop" data-confirm-close></div>
    <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="leasingConfirmTitle">
        <div class="confirm-modal-icon">🚜</div>
        <h3 id="leasingConfirmTitle">Подтверждение заявки</h3>
        <p class="confirm-modal-text" id="leasingConfirmText">Вы уверены, что хотите продолжить?</p>
        <div class="confirm-modal-actions">
            <button type="button" class="confirm-modal-btn secondary" data-confirm-close>Отмена</button>
            <button type="button" class="confirm-modal-btn primary" id="leasingConfirmSubmit">Оформить заявку</button>
        </div>
    </div>
</div>
